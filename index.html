<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Billetterie - Zeinab's Twist</title>
    <link rel="stylesheet" href="style.css">
    
    <script src="libs/qrcode.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>

    <div class="app-container">
        <header class="main-header">
            <div class="logo-t">T</div>
            <h1>Zeinab's Twist</h1>
        </header>

        <div class="card form-card">
            <h3>Enregistrer un invité</h3>
            <div class="form-stack">
                <input type="text" id="guest-fullname" placeholder="Nom complet">
                <input type="text" id="guest-profession" placeholder="Profession">
                <select id="guest-type">
                    <option value="PASS STANDARD">Pass Standard</option>
                    <option value="PASS VIP">Pass VIP</option>
                </select>
                <button class="btn-primary btn-emerald" onclick="generateTicket()">Générer le Ticket</button>
            </div>
        </div>

        <div id="result-section" class="result-area" style="display: none;">
            <div class="ticket-wrapper">
                <div id="ticket-to-export" class="ticket-design">
                    <div class="ticket-main">
                        <div class="ticket-header">
                            <span class="ticket-logo">T</span>
                            <span class="badge-emeraude" id="preview-guest-type">PASS</span>
                        </div>
                        <h2 class="event-title">ZEINAB'S TWIST</h2>
                        <div class="event-info-minimal">
                            <p>25 AVRIL 2026</p>
                            <p>PARC MANGARI</p>
                        </div>
                    </div>
                    <div class="ticket-side">
                        <div id="qrcode"></div>
                        <p class="qr-label">SCANNEZ POUR INFOS</p>
                    </div>
                </div>
            </div>
            <button class="btn-primary btn-gold" onclick="downloadTicket()">Télécharger le Ticket</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
